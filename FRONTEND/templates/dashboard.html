{% extends "base.html" %}
{% block title %}Dashboard — IBM Banking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

        <!-- Account balance card -->
        <div class="card shadow-sm text-center mb-4">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0">Account Overview</h4>
            </div>
            <div class="card-body py-5">
                <p class="text-muted mb-1">Current Balance</p>
                <h1 class="display-4 fw-bold text-success">
                    £{{ "%.2f"|format(balance) | replace("-", "−") }}
                </h1>
                <p class="text-muted mt-2 mb-0" style="font-size:0.85rem;">
                    Account holder: <strong>{{ username }}</strong>
                </p>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="row g-3">
            <div class="col-6">
                <a href="{{ url_for('deposit') }}" class="btn btn-success btn-lg w-100 py-3">
                    ＋ Deposit
                </a>
            </div>
            <div class="col-6">
                <a href="{{ url_for('withdraw') }}" class="btn btn-danger btn-lg w-100 py-3">
                    − Withdraw
                </a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
